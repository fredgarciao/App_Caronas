<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Caronas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 🔹 MÓDULOS (Namespace Global window.APP — sem build/bundler) -->
  <script src="./src/constants.js"></script>
  <script src="./src/types.js"></script>
  <script src="./src/utils.js"></script>
  <script src="./src/authService.js"></script>
  <script src="./src/tripsService.js"></script>
  <script src="./src/messagesService.js"></script>
  <script src="./src/notificationService.js"></script>

  <!-- 🔹 ÍCONES & HOOKS (JSX, precisam de Babel) -->
  <script type="text/babel" src="./src/icons.jsx"></script>
  <script type="text/babel" src="./src/hooks.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #070a10; }
    body { display: flex; justify-content: center; align-items: flex-start; }
    #root { width: 100%; max-width: 448px; height: 100dvh; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    button { border: none; background: none; cursor: pointer; }
    input, textarea { border: none; outline: none; }
    textarea { resize: none; font-family: inherit; }
    @keyframes slideUp   { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes bellShake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-14deg)} 40%{transform:rotate(14deg)} 60%{transform:rotate(-8deg)} 80%{transform:rotate(8deg)} }
    @keyframes pulse     { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
    .slide-up  { animation: slideUp 0.22s ease; }
    .fade-in   { animation: fadeIn  0.18s ease; }
    .bell-ring { animation: bellShake 0.5s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;
    const Ic = window.APP.Ic;

    /* ═══════════════════════════════════════════════════════════════
       SUPABASE CLIENT (config vem de src/constants.js)
    ═══════════════════════════════════════════════════════════════ */
    const supabase = window.supabase.createClient(window.APP.SUPABASE.URL, window.APP.SUPABASE.KEY);

    const DAYS = ["Seg","Ter","Qua","Qui","Sex"];
    const DAYS_FULL = ["Segunda","Terça","Quarta","Quinta","Sexta"];
    const F = { fontFamily: "'DM Sans', sans-serif" };
    const M = { fontFamily: "'DM Mono', monospace" };

    /* ═══════════════════════════════════════════════════════════════
       HELPERS LOCAIS (apresentação) — lógica de negócio vive em src/utils.js
    ═══════════════════════════════════════════════════════════════ */
    function getWeekDates() {
      const now = new Date(); const day = now.getDay(); const off = day === 0 ? -6 : 1 - day;
      const mon = new Date(now); mon.setDate(now.getDate() + off);
      return Array.from({ length: 5 }, (_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return d; });
    }
    function fmtTime(ts) { return window.APP.formatTime(ts); }
    function initials(name) { return window.APP.getInitials(name); }
    function avatarColor(str) { return window.APP.getAvatarColor(str); }

    /* ═══════════════════════════════════════════════════════════════
       UI PRIMITIVES
    ═══════════════════════════════════════════════════════════════ */
    function Avatar({ name, size = 28 }) {
      const bg = avatarColor(name);
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", background: bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <span style={{ ...F, color: "#fff", fontSize: size * 0.36, fontWeight: 700 }}>{initials(name)}</span>
        </div>
      );
    }

    function InputField({ label, error, ...props }) {
      return (
        <div style={{ marginTop: 14 }}>
          {label && <label style={{ ...F, display: "block", color: "#9fa8da", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 5 }}>{label}</label>}
          <input {...props} style={{ ...F, display: "block", width: "100%", background: "#0d1117", border: error ? "1.5px solid #ef5350" : "1.5px solid #252d4a", borderRadius: 12, padding: "11px 14px", color: "#e8eaf6", fontSize: "0.9rem", colorScheme: "dark" }} />
          {error && <p style={{ ...F, color: "#ef5350", fontSize: "0.7rem", marginTop: 3 }}>{error}</p>}
        </div>
      );
    }

    function Btn({ children, variant = "primary", full, disabled, onClick, type, style: sx }) {
      const base = { ...F, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, borderRadius: 12, fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1, width: full ? "100%" : undefined, padding: "12px 18px", fontSize: "0.9rem", transition: "all 0.2s" };
      const variants = { primary: { background: "#3f51b5", color: "#fff", border: "1px solid #5c6bc0" }, secondary: { background: "#141929", color: "#9fa8da", border: "1px solid #252d4a" }, danger: { background: "#1a1010", color: "#ef5350", border: "1px solid #3a1a1a" } };
      return <button type={type} disabled={disabled} onClick={onClick} style={{ ...base, ...variants[variant], ...sx }}>{children}</button>;
    }

    function ModalShell({ title, onClose, children }) {
      return (
        <div onClick={onClose} style={{ position: "absolute", inset: 0, zIndex: 60, display: "flex", alignItems: "flex-end", background: "rgba(0,0,0,0.65)", backdropFilter: "blur(4px)" }}>
          <div onClick={e => e.stopPropagation()} className="slide-up" style={{ width: "100%", background: "#131828", borderRadius: "20px 20px 0 0", padding: "20px 18px 32px", maxHeight: "92dvh", overflowY: "auto", borderTop: "1px solid #252d4a" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
              <h2 style={{ ...F, color: "#e8eaf6", fontWeight: 700, fontSize: "1.05rem" }}>{title}</h2>
              {onClose && <button onClick={onClose} style={{ color: "#5c6bc0" }}><Ic.X /></button>}
            </div>
            {children}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       NOTIFICATION BELL PANEL
    ═══════════════════════════════════════════════════════════════ */
    function BellPanel({ notifs, onClear, onClose }) {
      const unread = notifs.filter(n => !n.read).length;
      return (
        <div className="fade-in" style={{
          position: "absolute", top: 100, right: 12, zIndex: 80,
          width: "calc(100% - 24px)", maxWidth: 380,
          background: "#131828", borderRadius: 16,
          border: "1px solid #252d4a",
          boxShadow: "0 8px 32px rgba(0,0,0,0.6)",
          overflow: "hidden",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px 10px" }}>
            <span style={{ ...F, color: "#e8eaf6", fontWeight: 700, fontSize: "0.88rem" }}>
              Notificações {unread > 0 && <span style={{ color: "#5c6bc0" }}>({unread})</span>}
            </span>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {notifs.length > 0 && <button onClick={onClear} style={{ ...F, color: "#5c6bc0", fontSize: "0.72rem", fontWeight: 600 }}>Limpar</button>}
              <button onClick={onClose} style={{ color: "#5c6bc0" }}><Ic.X /></button>
            </div>
          </div>
          <div style={{ maxHeight: 320, overflowY: "auto", borderTop: "1px solid #1a1f2e" }}>
            {notifs.length === 0
              ? <p style={{ ...F, color: "#353e5c", fontSize: "0.82rem", padding: "20px 14px", textAlign: "center" }}>Nenhuma notificação.</p>
              : notifs.map(n => (
                <div key={n.id} style={{
                  padding: "11px 14px", borderBottom: "1px solid #1a1f2e",
                  background: n.read ? "transparent" : "#0e1322",
                  display: "flex", gap: 10, alignItems: "flex-start",
                }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: n.read ? "transparent" : "#5c6bc0", marginTop: 5, flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <p style={{ ...F, color: n.read ? "#5c6bc0" : "#c5cae9", fontSize: "0.8rem", lineHeight: 1.4 }}>{n.text}</p>
                    <p style={{ ...M, color: "#353e5c", fontSize: "0.67rem", marginTop: 2 }}>{fmtTime(n.ts)}</p>
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       AUTH SCREEN (Login + Registo + Recuperação de Senha)
    ═══════════════════════════════════════════════════════════════ */
    function AuthScreen({ onLogin, onRegister, onPasswordRecovery }) {
      const [mode, setMode]   = useState("login"); // login | register | recovery
      const [email, setEmail] = useState("");
      const [uname, setUname] = useState("");
      const [pw, setPw]       = useState("");
      const [name, setName]   = useState("");
      const [showPw, setShowPw] = useState(false);
      const [err, setErr]     = useState("");
      const [loading, setLoading] = useState(false);

      async function doLogin() {
        if (!email.trim() || !pw) { setErr("Preencha e-mail e senha."); return; }
        setLoading(true); setErr("");
        const result = await onLogin(email, pw);
        setLoading(false);
        if (!result.success) setErr(result.message);
      }

      async function doRegister() {
        if (!name.trim() || !email.trim() || !uname.trim() || pw.length < 6) { setErr("Preencha todos os campos (Senha mín 6 caracteres)."); return; }
        setLoading(true); setErr("");
        const result = await onRegister(name, email, uname, pw);
        setLoading(false);

        if (!result.success) { setErr(result.message); return; }

        if (result.requiresEmailVerification) {
          alert("Cadastro recebido! Verifique a caixa de entrada do seu e-mail para confirmar a conta.");
          setMode("login");
          setPw("");
        }
      }

      async function doRecover() {
        if (!email.trim()) { setErr("Por favor, preencha seu e-mail acima para recuperar a senha."); return; }
        setLoading(true); setErr("");
        const result = await onPasswordRecovery(email);
        setLoading(false);

        if (!result.success) { setErr(result.message); return; }

        alert("Se este e-mail estiver cadastrado, um link de recuperação foi enviado para sua caixa de entrada.");
        setMode("login");
      }

      return (
        <div style={{ ...F, width: "100%", height: "100dvh", background: "#0d1117", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 28px" }}>
          <div style={{ marginBottom: 36, textAlign: "center" }}>
            <img src="image_8885dd.png" alt="SENAI CIMATEC" style={{ height: "45px", marginBottom: "16px", objectFit: "contain" }} onError={e => { e.target.onerror = null; e.target.src = "https://placehold.co/200x50/0d1117/5c6bc0?text=SENAI+CIMATEC"; }} />
            <p style={{ color: "#5c6bc0", fontSize: "0.85rem", marginTop: 4 }}>Gestão de caronas corporativas</p>
          </div>

          <div style={{ display: "flex", background: "#141929", borderRadius: 12, padding: 4, marginBottom: 24, width: "100%", border: "1px solid #252d4a" }}>
            {["login","register"].map(m => (
              <button key={m} onClick={() => { setMode(m); setErr(""); }} style={{ flex: 1, padding: "9px 0", borderRadius: 9, background: mode === m ? "#283593" : "transparent", color: mode === m ? "#e8eaf6" : "#5c6bc0", ...F, fontWeight: 700, fontSize: "0.82rem", border: mode === m ? "1px solid #3949ab" : "1px solid transparent", cursor: "pointer" }}>
                {m === "login" ? "Entrar" : "Criar conta"}
              </button>
            ))}
          </div>

          <div style={{ width: "100%" }}>
            {mode === "register" && (
              <InputField label="Nome completo" type="text" placeholder="Ex.: João Silva" value={name} onChange={e => { setName(e.target.value); setErr(""); }} />
            )}

            <InputField label="E-mail corporativo" type="email" placeholder="Ex.: joao.silva@teste.com" value={email} onChange={e => { setEmail(e.target.value); setErr(""); }} />

            {mode === "register" && (
              <InputField label="Nome de Usuário" type="text" placeholder="Ex.: joaosilva" value={uname} onChange={e => { setUname(e.target.value); setErr(""); }} />
            )}

            {mode !== "recovery" && (
              <div style={{ marginTop: 14 }}>
                <label style={{ ...F, display: "block", color: "#9fa8da", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 5 }}>Senha</label>
                <div style={{ position: "relative" }}>
                  <input type={showPw ? "text" : "password"} placeholder="••••••" value={pw} onChange={e => { setPw(e.target.value); setErr(""); }} style={{ ...F, display: "block", width: "100%", background: "#0d1117", border: "1.5px solid #252d4a", borderRadius: 12, padding: "11px 44px 11px 14px", color: "#e8eaf6", fontSize: "0.9rem" }} />
                  <button onClick={() => setShowPw(v => !v)} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#5c6bc0", cursor: "pointer" }}>{showPw ? <Ic.EyeOff /> : <Ic.Eye />}</button>
                </div>
              </div>
            )}

            {err && <p style={{ ...F, color: "#ef5350", fontSize: "0.78rem", marginTop: 10 }}>{err}</p>}

            {mode === "login" && (
              <button onClick={() => { setMode("recovery"); setErr(""); }} style={{ ...F, color: "#5c6bc0", fontSize: "0.75rem", marginTop: 14, cursor: "pointer", textDecoration: "underline", display: "block", width: "100%", textAlign: "right" }}>Esqueci minha senha</button>
            )}

            {mode === "recovery" ? (
              <div style={{ marginTop: 22, display: "flex", gap: 10 }}>
                <Btn variant="secondary" full onClick={() => { setMode("login"); setErr(""); }}>Voltar</Btn>
                <Btn full onClick={doRecover} disabled={loading}>{loading ? "Enviando..." : "Enviar link"}</Btn>
              </div>
            ) : (
              <Btn full style={{ marginTop: 22 }} onClick={mode === "login" ? doLogin : doRegister} disabled={loading}>
                {loading ? "Aguarde..." : mode === "login" ? <><Ic.Check /> Entrar</> : <><Ic.Plus /> Criar conta</>}
              </Btn>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       CHAT SCREEN
    ═══════════════════════════════════════════════════════════════ */
    function ChatScreen({ trip, messages, currentUser, onClose, onSend }) {
      const [text, setText] = useState("");
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages]);

      function handleSend() {
        const t = text.trim();
        if (!t) return;
        onSend(trip.id, t, currentUser.name);
        setText("");
      }

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
      }

      return (
        <div className="fade-in" style={{
          position: "absolute", inset: 0, zIndex: 70,
          background: "#0d1117", display: "flex", flexDirection: "column",
        }}>
          <div style={{ background: "#0d1117", borderBottom: "1px solid #141929", padding: "14px 14px 12px", display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={onClose} style={{ color: "#5c6bc0", flexShrink: 0 }}><Ic.Back /></button>
            <div style={{ flex: 1, minWidth: 0 }}>
              <p style={{ ...F, color: "#e8eaf6", fontWeight: 700, fontSize: "0.92rem", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {trip.origin} <span style={{ color: '#5c6bc0', margin: '0 2px' }}>➔</span> {trip.destination}
              </p>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 8px" }}>
            {messages.length === 0 && (
              <p style={{ ...F, color: "#353e5c", fontSize: "0.82rem", textAlign: "center", marginTop: 40 }}>
                Nenhuma mensagem ainda.<br />Seja o primeiro a falar!
              </p>
            )}
            {messages.map(msg => {
              const isMe = msg.user_id === currentUser.id;
              return (
                <div key={msg.id} style={{
                  display: "flex", flexDirection: isMe ? "row-reverse" : "row",
                  gap: 8, marginBottom: 12, alignItems: "flex-end",
                }}>
                  {!isMe && <Avatar name={msg.user_name || "?"} size={26} />}
                  <div style={{ maxWidth: "72%" }}>
                    {!isMe && <p style={{ ...F, color: "#5c6bc0", fontSize: "0.67rem", marginBottom: 2, marginLeft: 2 }}>{msg.user_name}</p>}
                    <div style={{
                      background: isMe ? "#283593" : "#141929",
                      border: `1px solid ${isMe ? "#3949ab" : "#252d4a"}`,
                      borderRadius: isMe ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                      padding: "8px 12px",
                    }}>
                      <p style={{ ...F, color: "#e8eaf6", fontSize: "0.84rem", lineHeight: 1.45 }}>{msg.text}</p>
                    </div>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef} />
          </div>

          <div style={{ padding: "10px 12px 24px", borderTop: "1px solid #141929", display: "flex", gap: 8, alignItems: "flex-end" }}>
            <textarea
              rows={1} placeholder="Mensagem..." value={text} onChange={e => setText(e.target.value)} onKeyDown={handleKey}
              style={{
                ...F, flex: 1, background: "#141929", border: "1.5px solid #252d4a", borderRadius: 12,
                padding: "10px 14px", color: "#e8eaf6", fontSize: "0.88rem", outline: "none", maxHeight: 100
              }}
            />
            <button
              onClick={handleSend}
              style={{
                width: 40, height: 40, borderRadius: 12, background: text.trim() ? "#3f51b5" : "#141929",
                color: text.trim() ? "#fff" : "#353e5c", border: `1px solid ${text.trim() ? "#5c6bc0" : "#252d4a"}`,
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer",
              }}
            >
              <Ic.Send />
            </button>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       TRIP CARD
    ═══════════════════════════════════════════════════════════════ */
    function TripCard({ trip, currentUser, users, onJoin, onLeave, onEdit, onDelete, onChat }) {
      const full      = trip.seatsLeft === 0;
      const isOwner   = trip.ownerId === currentUser.id;
      const isParticipant = trip.participants.includes(currentUser.id);

      const participantProfiles = trip.participants
        .map(id => (users || []).find(u => u.id === id))
        .filter(Boolean);

      return (
        <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 14 }}>
          <div style={{ minWidth: 40, textAlign: "right", paddingTop: 5 }}><span style={{ ...M, color: "#5c6bc0", fontSize: "0.73rem", fontWeight: 600 }}>{trip.time}</span></div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 7 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: full ? "#353e5c" : "#5c6bc0", flexShrink: 0 }} />
            <div style={{ width: 1, flex: 1, background: "#1a1e30", minHeight: 44 }} />
          </div>
          <div style={{ flex: 1, borderRadius: 14, padding: "11px 12px 10px", background: full ? "#10131c" : "#141929", border: `1.5px solid ${isOwner ? "#2d3561" : "#1e2440"}`, opacity: full ? 0.75 : 1 }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 5 }}><span style={{ color: "#5c6bc0" }}><Ic.Pin /></span><span style={{ ...F, color: "#e8eaf6", fontWeight: 700, fontSize: "0.86rem", lineHeight: 1.2 }}>{trip.origin} <span style={{ color: '#5c6bc0', margin: '0 2px' }}>➔</span> {trip.destination}</span></div>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ color: "#5c6bc0" }}><Ic.Clock /></span><span style={{ ...F, color: "#9fa8da", fontSize: "0.75rem" }}>{trip.time}</span></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ color: full ? "#424242" : "#5c6bc0" }}><Ic.Users /></span><span style={{ ...F, color: full ? "#424242" : "#9fa8da", fontSize: "0.75rem" }}>{full ? "Esgotado" : `${trip.seatsLeft}/${trip.totalSeats} vagas`}</span></div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}><Avatar name={trip.ownerName} size={18} /><span style={{ ...F, color: "#7986cb", fontSize: "0.72rem" }}>{trip.ownerName}{trip.contact ? ` · ${trip.contact}` : ""}</span></div>

                {participantProfiles.length > 0 && (
                  <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid #1a1e30", display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {participantProfiles.map(u => (
                      <div key={u.id} style={{ display: "flex", alignItems: "center", gap: 5, background: "#1a1f2e", padding: "4px 8px", borderRadius: 12, border: "1px solid #252d4a" }}>
                        <Avatar name={u.name} size={16} />
                        <span style={{ ...F, color: "#9fa8da", fontSize: "0.65rem", fontWeight: 600 }}>{u.name.split(' ')[0]}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 5, flexShrink: 0, alignItems: "flex-end" }}>
                {isParticipant && (
                  <button onClick={() => onChat(trip)} style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 9px", borderRadius: 8, background: "#1a1f2e", color: "#9fa8da", border: "1px solid #252d4a", cursor: "pointer", ...F, fontSize: "0.68rem", fontWeight: 700 }}>
                    <Ic.Chat /> Chat
                  </button>
                )}

                {isOwner ? (
                  <div style={{ display: "flex", gap: 5 }}>
                    <button onClick={() => onEdit(trip)} style={{ padding: "5px 8px", borderRadius: 8, background: "#1a2240", color: "#9fa8da", border: "1px solid #252d4a", cursor: "pointer" }}><Ic.Edit /></button>
                    <button onClick={() => onDelete(trip)} style={{ padding: "5px 8px", borderRadius: 8, background: "#1a1010", color: "#ef5350", border: "1px solid #3a1a1a", cursor: "pointer" }}><Ic.Trash /></button>
                  </div>
                ) : !isParticipant ? (
                  <button disabled={full} onClick={() => !full && onJoin(trip)} style={{ ...F, display: "flex", alignItems: "center", gap: 5, padding: "5px 10px", borderRadius: 8, background: full ? "#1a1e30" : "#283593", color: full ? "#353e5c" : "#9fa8da", border: `1px solid ${full ? "#1e2440" : "#3949ab"}`, fontSize: "0.7rem", fontWeight: 700, cursor: full ? "not-allowed" : "pointer" }}><Ic.Car /> {full ? "Lotado" : "Aderir"}</button>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, marginTop: 4 }}>
                    <span style={{ ...F, color: "#43a047", fontSize: "0.65rem", fontWeight: 700 }}>✓ Inscrito</span>
                    <button onClick={() => onLeave(trip)} style={{ ...F, color: "#ef5350", fontSize: "0.65rem", fontWeight: 600, cursor: "pointer", textDecoration: "underline" }}>Sair da carona</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       MAIN APP — usando os hooks modulares (useAuth, useTrips, useMessages, useNotifications)
    ═══════════════════════════════════════════════════════════════ */
    function App() {
      const auth = window.APP.useAuth(supabase);
      const trips = window.APP.useTrips(supabase, auth.user?.id);
      const messagesHook = window.APP.useMessages(supabase, auth.user?.id);
      const notifs = window.APP.useNotifications(auth.user?.id);

      const [users, setUsers] = useState([]);

      const [editTrip, setEditTrip] = useState(null);
      const [deleteTrip, setDeleteTrip] = useState(null);
      const [joinTrip, setJoinTrip] = useState(null);
      const [leaveTrip, setLeaveTrip] = useState(null);

      const [chatTrip, setChatTrip] = useState(null);
      const [showBell, setShowBell] = useState(false);
      const [bellAnim, setBellAnim] = useState(false);

      // Troca de senha obrigatória (fluxo de recuperação via e-mail)
      const [showPasswordUpdate, setShowPasswordUpdate] = useState(false);
      const [newPassword, setNewPassword] = useState("");

      const weekDates = useMemo(() => getWeekDates(), []);

      async function fetchUsers() {
        const { data } = await supabase.from('profiles').select('id, name');
        if (data) setUsers(data);
      }

      useEffect(() => { fetchUsers(); }, []);

      // Escuta o clique no link de recuperação de senha do e-mail
      useEffect(() => {
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event) => {
          if (event === 'PASSWORD_RECOVERY') {
            setShowPasswordUpdate(true);
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      async function handleUpdatePassword() {
        if (newPassword.length < 6) return alert("A nova senha deve ter no mínimo 6 caracteres.");
        const result = await auth.updatePassword(newPassword);
        if (!result.success) {
          alert("Erro ao atualizar senha: " + result.message);
        } else {
          alert("Sua senha foi atualizada com sucesso!");
          window.location.hash = '';
          window.location.reload();
        }
      }

      function openChat(trip) {
        setChatTrip(trip);
        messagesHook.loadMessages(trip.id);
      }

      function pushNotif(text, forUsers) {
        notifs.push(text, forUsers);
        setBellAnim(true);
        setTimeout(() => setBellAnim(false), 600);
      }

      async function handleJoinConfirm(tripId) {
        const t = trips.trips.find(x => x.id === tripId);
        const result = await trips.join(tripId);
        if (result.success && t) pushNotif(`${auth.user.name} entrou na sua carona saindo de ${t.origin}`, [t.ownerId]);
      }

      async function handleLeaveConfirm(tripId) {
        const t = trips.trips.find(x => x.id === tripId);
        const result = await trips.leave(tripId);
        if (result.success && t) pushNotif(`${auth.user.name} saiu da sua carona saindo de ${t.origin}`, [t.ownerId]);
      }

      async function handleSendMsg(tripId, text, userName) {
        const result = await messagesHook.send(tripId, text, userName);
        if (result.success) {
          const t = trips.trips.find(x => x.id === tripId);
          if (t) pushNotif(`Nova mensagem em: ${t.origin}`, t.participants.filter(id => id !== auth.user.id));
        }
      }

      // Loading inicial (sessão)
      if (auth.loading) {
        return (
          <div style={{ width: "100%", height: "100dvh", background: "#0d1117", display: "flex", justifyContent: "center", alignItems: "center", color: "#5c6bc0" }}>
            <Ic.Loader />
          </div>
        );
      }

      if (!auth.user) {
        return (
          <AuthScreen
            onLogin={auth.login}
            onRegister={auth.register}
            onPasswordRecovery={auth.sendPasswordRecovery}
          />
        );
      }

      const currentUser = auth.user;
      const unreadNotifs = notifs.unreadCount;

      return (
        <div style={{ width: "100%", height: "100dvh", background: "#0d1117", display: "flex", flexDirection: "column", position: "relative", overflow: "hidden" }}>

          {/* MODAL TRAVADO DE REDEFINIÇÃO DE SENHA */}
          {showPasswordUpdate && (
            <div style={{ position: "absolute", inset: 0, zIndex: 999, background: "#0d1117", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28 }}>
              <div style={{ width: "100%", background: "#141929", padding: 24, borderRadius: 16, border: "1px solid #252d4a" }}>
                <h2 style={{ ...F, color: "#e8eaf6", fontWeight: 700, fontSize: "1.2rem", marginBottom: 8 }}>Redefinir Senha</h2>
                <p style={{ ...F, color: "#9fa8da", fontSize: "0.82rem", marginBottom: 20 }}>Digite sua nova senha abaixo para recuperar o acesso à sua conta.</p>

                <label style={{ ...F, display: "block", color: "#9fa8da", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 5 }}>Nova Senha</label>
                <input type="password" placeholder="••••••" value={newPassword} onChange={e => setNewPassword(e.target.value)} style={{ ...F, display: "block", width: "100%", background: "#0d1117", border: "1.5px solid #252d4a", borderRadius: 12, padding: "11px 14px", color: "#e8eaf6", fontSize: "0.9rem", marginBottom: 20 }} />

                <Btn full onClick={handleUpdatePassword}><Ic.Check /> Atualizar Senha</Btn>
              </div>
            </div>
          )}

          <div style={{ background: "#0d1117", display: "flex", justifyContent: "center", paddingTop: "18px", paddingBottom: "4px" }}>
            <img src="image_8885dd.png" alt="SENAI CIMATEC" style={{ height: "30px", objectFit: "contain" }} onError={e => { e.target.onerror = null; e.target.src = "https://placehold.co/150x30/0d1117/5c6bc0?text=SENAI+CIMATEC"; }} />
          </div>

          <div style={{ background: "#0d1117", borderBottom: "1px solid #141929", zIndex: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px 10px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <Avatar name={currentUser.name} size={32} />
                <div>
                  <p style={{ ...F, color: "#5c6bc0", fontSize: "0.63rem", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600 }}>Semana atual</p>
                  <h1 style={{ ...F, color: "#e8eaf6", fontSize: "1.05rem", fontWeight: 700, lineHeight: 1 }}>Caronas</h1>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

                <div style={{ position: "relative" }}>
                  <button className={bellAnim ? "bell-ring" : ""} onClick={() => { setShowBell(v => !v); notifs.markAllAsRead(); }} style={{ color: unreadNotifs > 0 ? "#e8eaf6" : "#5c6bc0", padding: 4, position: "relative", cursor: "pointer" }}>
                    <Ic.Bell />
                    {unreadNotifs > 0 && <span style={{ position: "absolute", top: 0, right: 0, width: 15, height: 15, borderRadius: "50%", background: "#3f51b5", color: "#fff", ...F, fontSize: "0.6rem", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", border: "1.5px solid #0d1117" }}>{unreadNotifs}</span>}
                  </button>
                </div>

                <button onClick={() => setEditTrip("new")} style={{ ...F, display: "flex", alignItems: "center", gap: 5, padding: "7px 12px", borderRadius: 10, background: "#283593", color: "#9fa8da", border: "1px solid #3949ab", fontWeight: 700, fontSize: "0.76rem", cursor: "pointer" }}><Ic.Plus /> Nova</button>
                <button onClick={auth.logout} style={{ color: "#5c6bc0", padding: 4, cursor:"pointer" }}><Ic.LogOut /></button>
              </div>
            </div>

            <div style={{ display: "flex", padding: "0 8px", gap: 2 }}>
              {DAYS.map((d, i) => {
                const date = weekDates[i]; const active = trips.selectedDay === i;
                return (
                  <button key={i} onClick={() => trips.setSelectedDay(i)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", padding: "7px 0 0", background: active ? "#141929" : "transparent", borderBottom: active ? "2px solid #5c6bc0" : "2px solid transparent", borderRadius: "10px 10px 0 0", cursor: "pointer", transition: "all 0.15s" }}>
                    <span style={{ ...F, color: active ? "#9fa8da" : "#353e5c", fontSize: "0.62rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>{d}</span>
                    <span style={{ ...M, marginTop: 3, marginBottom: 5, width: 24, height: 24, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", color: active ? "#e8eaf6" : "#353e5c", fontSize: "0.78rem" }}>{date.getDate()}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 80px" }}>
            {trips.loading ? (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 52, color: "#5c6bc0" }}><Ic.Loader /><p style={{ ...F, fontSize: "0.8rem", marginTop: 12 }}>Sincronizando com a nuvem...</p></div>
            ) : trips.dayTrips.length === 0 ? (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 52, gap: 12 }}>
                <div style={{ width: 52, height: 52, borderRadius: 14, background: "#141929", display: "flex", alignItems: "center", justifyContent: "center", color: "#353e5c" }}><Ic.Car /></div>
                <p style={{ ...F, color: "#353e5c", fontSize: "0.84rem", textAlign: "center" }}>Nenhuma carona para este dia.</p>
                <button onClick={() => setEditTrip("new")} style={{ ...F, color: "#5c6bc0", fontSize: "0.8rem", fontWeight: 700, textDecoration: "underline", cursor: "pointer" }}>Criar a primeira</button>
              </div>
            ) : (
              trips.dayTrips.map(trip => (
                <TripCard
                  key={trip.id}
                  trip={trip}
                  currentUser={currentUser}
                  users={users}
                  onJoin={setJoinTrip}
                  onLeave={setLeaveTrip}
                  onEdit={t => setEditTrip(t)}
                  onDelete={setDeleteTrip}
                  onChat={openChat}
                />
              ))
            )}
          </div>

          {showBell && <BellPanel notifs={notifs.relevantNotifications} onClear={notifs.clear} onClose={() => setShowBell(false)} />}
          {showBell && <div onClick={() => setShowBell(false)} style={{ position: "absolute", inset: 0, zIndex: 79 }} />}

          {/* Modals */}
          {editTrip && (
            <ModalShell title={editTrip === "new" ? `Nova Carona — ${DAYS_FULL[trips.selectedDay]}` : "Editar Carona"} onClose={() => setEditTrip(null)}>
              <form onSubmit={async e => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newTotal = parseInt(fd.get('seats'));

                const data = {
                  origin: fd.get('origin'),
                  destination: fd.get('dest'),
                  time: fd.get('time'),
                  totalSeats: newTotal,
                  seatsLeft: newTotal,
                  contact: fd.get('contact'),
                };

                if (editTrip === "new") {
                  await trips.create(data, trips.selectedDay, currentUser.name);
                } else {
                  await trips.edit(editTrip.id, data);
                }
                setEditTrip(null);
              }}>
                <InputField label="Local de Partida" name="origin" type="text" defaultValue={editTrip !== "new" ? editTrip.origin : ""} required />
                <InputField label="Local de Chegada" name="dest" type="text" defaultValue={editTrip !== "new" ? editTrip.destination : ""} required />
                <InputField label="Horário Pretendido" name="time" type="time" defaultValue={editTrip !== "new" ? editTrip.time : ""} required />
                <InputField label="Quantidade de Vagas totais" name="seats" type="number" min="1" max="8" defaultValue={editTrip !== "new" ? editTrip.totalSeats : ""} required />
                <InputField label="Celular do Responsável" name="contact" type="tel" defaultValue={editTrip !== "new" ? editTrip.contact : ""} required />
                <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
                  <Btn type="button" variant="secondary" full onClick={() => setEditTrip(null)}>Cancelar</Btn>
                  <Btn type="submit" full>{editTrip === "new" ? <><Ic.Plus /> Criar</> : <><Ic.Edit /> Salvar</>}</Btn>
                </div>
              </form>
            </ModalShell>
          )}

          {joinTrip && (
            <ModalShell title="Aderir à Carona" onClose={() => setJoinTrip(null)}>
              <p style={{ ...F, color: "#9fa8da", fontSize: "0.82rem", marginBottom: 18 }}>Confirma adesão como <strong style={{ color: "#e8eaf6" }}>{currentUser.name}</strong>?</p>
              <div style={{ display: "flex", gap: 10 }}>
                <Btn variant="secondary" full onClick={() => setJoinTrip(null)}>Cancelar</Btn>
                <Btn full onClick={() => { handleJoinConfirm(joinTrip.id); setJoinTrip(null); }}><Ic.Check /> Confirmar</Btn>
              </div>
            </ModalShell>
          )}
          {leaveTrip && (
            <ModalShell title="Sair da Carona" onClose={() => setLeaveTrip(null)}>
              <p style={{ ...F, color: "#9fa8da", fontSize: "0.82rem", marginBottom: 18 }}>Tem certeza que deseja cancelar sua vaga?</p>
              <div style={{ display: "flex", gap: 10 }}>
                <Btn variant="secondary" full onClick={() => setLeaveTrip(null)}>Voltar</Btn>
                <Btn variant="danger" full onClick={() => { handleLeaveConfirm(leaveTrip.id); setLeaveTrip(null); }}>Sair</Btn>
              </div>
            </ModalShell>
          )}
          {deleteTrip && (
            <ModalShell title="Excluir Carona" onClose={() => setDeleteTrip(null)}>
              <p style={{ ...F, color: "#9fa8da", fontSize: "0.82rem", marginBottom: 18 }}>Tem certeza que deseja excluir esta carona?</p>
              <div style={{ display: "flex", gap: 10 }}>
                <Btn variant="secondary" full onClick={() => setDeleteTrip(null)}>Cancelar</Btn>
                <Btn variant="danger" full onClick={() => { trips.delete(deleteTrip.id); setDeleteTrip(null); }}>Excluir</Btn>
              </div>
            </ModalShell>
          )}

          {chatTrip && <ChatScreen trip={chatTrip} messages={messagesHook.messages} currentUser={currentUser} onClose={() => setChatTrip(null)} onSend={handleSendMsg} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
